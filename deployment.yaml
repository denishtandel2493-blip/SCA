apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpp-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpp-web
  template:
    metadata:
      labels:
        app: cpp-web
    spec:
      containers:
      - name: cpp-web
        image: cpp-web:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
